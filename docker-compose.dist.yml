services:
  migrate:
    image: tiburon07/rioaction-backend:latest
    container_name: rioaction_migrate
    command: python manage.py migrate --noinput
    env_file:
      - ${ENV_FILE:-.env}
    environment:
      - TZ=Europe/Rome
    networks:
      - project_nw
    restart: "no"

  backend:
    image: tiburon07/rioaction-backend:latest
    container_name: rioaction_backend
    volumes:
      - ${HOST_VOLUME}:${HOST_VOLUME}
    ports:
      - "8000:8000"
    env_file:
      - ${ENV_FILE:-.env}
    depends_on:
      migrate:
        condition: service_completed_successfully
      redis:
        condition: service_started
    environment:
      - TZ=Europe/Rome
      - BASE_CODE_PATH=${BASE_CODE_PATH}
      - CONTAINER_UID=${CONTAINER_UID:-1000}
      - CONTAINER_USER=${CONTAINER_USER:-}
      - HOST_USER=${HOST_USER:-}
      - HOST_HOME=${HOST_HOME:-}
    security_opt:
      - apparmor=unconfined
    networks:
      - project_nw

  frontend:
    image: tiburon07/rioaction-frontend:latest
    container_name: rioaction_frontend
    ports:
      - "${PORT:-5173}:${PORT:-5173}"
    volumes:
      - ./nginx-configs/nginx_frontend.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend
    security_opt:
      - apparmor=unconfined
    networks:
      - project_nw

  redis:
    image: redis:7.0-alpine3.19
    command: redis-server --appendonly yes
    container_name: rioaction_redis
    volumes:
      - project_redis_data:/data
    security_opt:
      - apparmor=unconfined
    networks:
      - project_nw

  celeryworker:
    image: tiburon07/rioaction-backend:latest
    container_name: rioaction_celeryworker
    user: root
    volumes:
      - ${HOST_VOLUME}:${HOST_VOLUME}
      - /var/run/docker.sock:/var/run/docker.sock
      - ${COMPOSE_PROJECT_PATH}:${COMPOSE_PROJECT_PATH}:ro
    working_dir: ${COMPOSE_PROJECT_PATH}
    command: celery -A config worker --loglevel=info
    env_file:
      - ${ENV_FILE:-.env}
    depends_on:
      - redis
    environment:
      - TZ=Europe/Rome
      - BASE_CODE_PATH=${BASE_CODE_PATH}
      - COMPOSE_PROJECT_PATH=${COMPOSE_PROJECT_PATH}
      - UPDATE_COMPOSE_FILE=${COMPOSE_PROJECT_PATH}/docker-compose.dist.yml
    security_opt:
      - apparmor=unconfined
    networks:
      - project_nw

  flower:
    image: tiburon07/rioaction-backend:latest
    container_name: rioaction_flower
    command: celery -A config flower --port=5555
    ports:
      - "5555:5555"
    env_file:
      - ${ENV_FILE:-.env}
    depends_on:
      - redis
    security_opt:
      - apparmor=unconfined
    networks:
      - project_nw

  codeserver:
    image: codercom/code-server:latest
    container_name: rioaction_codeserver
    user: root
    volumes:
      - ${HOST_VOLUME}:${HOST_VOLUME}
      - project_codeserver_data:/var/lib/code-server
    entrypoint:
      - /bin/sh
      - -c
      - |
        mkdir -p /var/lib/code-server
        chown -R ${CONTAINER_UID}:${CONTAINER_UID} /var/lib/code-server
        mkdir -p /var/lib/code-server/home/.config
        chown -R ${CONTAINER_UID}:${CONTAINER_UID} /var/lib/code-server
        exec sudo -u "#${CONTAINER_UID}" HOME=/var/lib/code-server/home XDG_CONFIG_HOME=/var/lib/code-server/home/.config /usr/bin/code-server --auth none --bind-addr 0.0.0.0:8080 --user-data-dir /var/lib/code-server/data --extensions-dir /var/lib/code-server/extensions ${HOST_VOLUME}
    environment:
      - TZ=Europe/Rome
      - CONTAINER_UID=${CONTAINER_UID:-1000}
    networks:
      - project_nw

  codeserver-proxy:
    image: nginx:alpine
    container_name: rioaction_codeserver_proxy
    volumes:
      - ./nginx-configs/nginx_codeserver.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - "8081:80"
    depends_on:
      - codeserver
    security_opt:
      - apparmor=unconfined
    networks:
      - project_nw

networks:
  project_nw:
    name: rioaction_nw
    driver: bridge
    driver_opts:
      com.docker.network.bridge.enable_icc: "true"

volumes:
  project_redis_data:
    name: rioaction_redis_data
  project_codeserver_data:
    name: rioaction_codeserver_data
